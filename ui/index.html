<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirSend</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="header-row">
          <h1>AirSend</h1>
          <button
            id="lang-toggle"
            class="lang-toggle"
            type="button"
            data-i18n="lang_toggle_to_en"
            data-i18n-attr="title:lang_toggle_title,aria-label:lang_toggle_title"
          >EN</button>
        </div>
        <p class="subtitle" data-i18n="subtitle">Envía el audio de Windows a tu HomePod</p>
      </header>
      <section>
        <div class="row">
          <button id="scan" data-i18n="scan">Buscar dispositivos</button>
          <span id="status" class="status"></span>
        </div>
        <ul id="devices"></ul>
        <div id="player" class="player" hidden>
          <div class="player-row">
            <button id="play-stop" class="play" data-i18n="play_generic">▶ Reproducir audio del PC</button>
            <span id="player-status" class="status"></span>
          </div>
          <label class="vol">
            <span data-i18n="volume">Volumen</span>
            <input id="volume" type="range" min="0" max="100" value="20" />
            <output id="vol-out">20%</output>
          </label>
        </div>
        <details class="manual">
          <summary data-i18n="manual_summary">¿No aparece tu HomePod? Añade su IP manualmente</summary>
          <p class="hint" data-i18n="manual_hint">
            Algunos routers (Movistar HGU, redes con VLANs) no propagan mDNS entre
            wifi 2.4 y 5 GHz. Mira la IP del HomePod en la app Casa del iPhone.
          </p>
          <div class="row">
            <input id="manual-ip" placeholder="192.168.1.50" />
            <input
              id="manual-name"
              placeholder="Nombre (opcional)"
              data-i18n-attr="placeholder:manual_name_placeholder"
            />
            <button id="manual-add" data-i18n="manual_add">Añadir</button>
          </div>
          <span id="manual-status" class="status"></span>
        </details>
      </section>
    </main>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
