<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConexionAirPlay</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>ConexionAirPlay</h1>
        <p class="subtitle">Envía el audio de Windows a tu HomePod</p>
      </header>
      <section>
        <div class="row">
          <button id="scan">Buscar dispositivos</button>
          <span id="status" class="status"></span>
        </div>
        <ul id="devices"></ul>
        <div id="player" class="player" hidden>
          <div class="player-row">
            <button id="play-stop" class="play">▶ Reproducir audio del PC</button>
            <span id="player-status" class="status"></span>
          </div>
          <label class="vol">
            <span>Volumen</span>
            <input id="volume" type="range" min="0" max="100" value="20" />
            <output id="vol-out">20%</output>
          </label>
        </div>
        <details class="manual">
          <summary>¿No aparece tu HomePod? Añade su IP manualmente</summary>
          <p class="hint">
            Algunos routers (Movistar HGU, redes con VLANs) no propagan mDNS entre
            wifi 2.4 y 5 GHz. Mira la IP del HomePod en la app Casa del iPhone.
          </p>
          <div class="row">
            <input id="manual-ip" placeholder="192.168.1.50" />
            <input id="manual-name" placeholder="Nombre (opcional)" />
            <button id="manual-add">Añadir</button>
          </div>
          <span id="manual-status" class="status"></span>
        </details>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
